<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>D6 GIF Keys — hero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px; height: 675px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #16161c 0%, #0a0a0e 50%, #12121a 100%);
      display: flex; overflow: hidden;
    }
    .left {
      flex: 1; padding: 48px 40px 48px 56px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 14px;
      margin-bottom: 20px; border: 1px solid #333;
    }
    h1 {
      font-size: 36px; font-weight: 700; color: #f2f2f5;
      line-height: 1.15; margin-bottom: 12px;
    }
    h1 em { color: #4ebbe4; font-style: normal; }
    .desc {
      font-size: 15px; line-height: 1.55; color: #9a9aa8;
      max-width: 420px; margin-bottom: 28px;
    }
    .features {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .tag {
      background: rgba(78,187,228,.12); border: 1px solid rgba(78,187,228,.35);
      color: #7dd3f0; padding: 6px 14px; border-radius: 20px; font-size: 12px;
    }
    .right {
      width: 580px; display: flex; align-items: center; justify-content: center;
      gap: 20px; padding-right: 40px;
    }
    .panel {
      width: 300px; background: #2d2d2d; border-radius: 8px;
      border: 1px solid #3a3a3a; padding: 12px 0; box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .panel .heading {
      display: flex; align-items: center; color: #d8d8d8;
      font-size: 11px; margin: 4px 16px 8px;
    }
    .panel .heading::before, .panel .heading::after {
      content: ""; flex: 1; height: 1px; background: #3d3d3d; margin: 0 10px;
    }
    .row {
      display: flex; align-items: center; padding: 5px 16px; font-size: 10px;
    }
    .row .l { width: 72px; color: #9a9a9a; }
    .row .v { flex: 1; color: #d8d8d8; }
    .bar {
      height: 4px; background: #3d3d3d; border-radius: 2px; flex: 1;
      position: relative; margin-right: 8px;
    }
    .bar::after {
      content: ""; position: absolute; left: 0; top: 0; height: 100%;
      width: 55%; background: #4ebbe4; border-radius: 2px;
    }
    .deck-wrap {
      background: #0d0d10; border-radius: 16px; padding: 14px;
      border: 1px solid #2a2a32; box-shadow: 0 16px 40px rgba(0,0,0,.4);
    }
    .deck {
      display: grid; grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 72px); gap: 8px;
    }
    .key {
      width: 72px; height: 72px; border-radius: 10px;
      background: #252530; border: 2px solid #3a3a48;
      overflow: hidden; position: relative;
    }
    .key.hot { border-color: #4ebbe4; box-shadow: 0 0 10px rgba(78,187,228,.3); }
    .key img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .key .bg { object-fit: cover; opacity: .5; }
    .key .lbl {
      position: absolute; bottom: 4px; left: 0; right: 0; text-align: center;
      font-size: 8px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px #000; z-index: 2;
    }
  </style>
</head>
<body>
  <div class="left">
    <img class="logo" src="../com.rkfsociety.d6gifkeys.sdPlugin/static/icon.png" alt="icon">
    <h1>Animated <em>GIF</em><br>on D6 Keys</h1>
    <p class="desc">
      D6 GIF Keys for FIFINE D6 and StreamDock. Load a file or URL,
      tune speed 25–400%, fixed FPS or native GIF timing.
    </p>
    <div class="features">
      <span class="tag">GIF animation</span>
      <span class="tag">Speed control</span>
      <span class="tag">Counter</span>
      <span class="tag">Open URL</span>
    </div>
  </div>
  <div class="right">
    <div class="deck-wrap">
      <div class="deck">
        <div class="key hot">
          <img class="bg" src="../com.rkfsociety.d6gifkeys.sdPlugin/static/default.jpg" alt="">
          <img src="../com.rkfsociety.d6gifkeys.sdPlugin/static/demo.gif" alt="">
          <span class="lbl">LIVE</span>
        </div>
        <div class="key hot">
          <img class="bg" src="../com.rkfsociety.d6gifkeys.sdPlugin/static/default.jpg" alt="">
          <img src="../com.rkfsociety.d6gifkeys.sdPlugin/static/demo.gif" alt="">
        </div>
        <div class="key" style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#ccc;">42</div>
        <div class="key" style="opacity:.3;"></div>
        <div class="key" style="opacity:.3;"></div>
        <div class="key" style="display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;">URL</div>
      </div>
    </div>
    <div class="panel">
      <div class="heading">GIF на кнопке</div>
      <div class="row"><span class="l">Скорость</span><span class="v" style="display:flex;align-items:center;"><span class="bar"></span>150%</span></div>
      <div class="row"><span class="l">Тайминг</span><span class="v">Фиксированный FPS</span></div>
      <div class="row"><span class="l">FPS</span><span class="v">15</span></div>
      <div class="row"><span class="l">Фон</span><span class="v">50%</span></div>
      <div class="row"><span class="l">Подпись</span><span class="v">LIVE</span></div>
      <div class="row" style="padding-top:8px;">
        <img src="../com.rkfsociety.d6gifkeys.sdPlugin/static/demo.gif" alt=""
          style="width:80px;height:80px;border-radius:6px;border:1px solid #444;margin-left:72px;">
      </div>
    </div>
  </div>
</body>
</html>
